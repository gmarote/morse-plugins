<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: var(--color-background-tertiary, #f1f5f9); color: var(--color-text-primary); min-height: 100vh; }

  .header { display: flex; justify-content: space-between; align-items: baseline; padding: 1.25rem 0 1.5rem; }
  .project-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 2px; }
  .project-title { font-size: 20px; font-weight: 500; margin: 0; color: var(--color-text-primary); }
  .updated-at { font-size: 12px; color: var(--color-text-tertiary); white-space: nowrap; }

  .alerts { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1.5rem; }
  .alert { border-radius: var(--border-radius-md, 8px); padding: 10px 14px; display: flex; align-items: center; gap: 14px; }
  .alert.vencido { background: var(--color-background-danger); }
  .alert.inmediata { background: var(--color-background-warning); }
  .alert-label { font-size: 11px; font-weight: 500; white-space: nowrap; min-width: 105px; }
  .alert.vencido .alert-label { color: var(--color-text-danger); }
  .alert.inmediata .alert-label { color: var(--color-text-warning); }
  .alert-text { font-size: 13px; flex: 1; }
  .alert.vencido .alert-text { color: var(--color-text-danger); }
  .alert.inmediata .alert-text { color: var(--color-text-warning); }

  .no-alerts { background: var(--color-background-success); border-radius: var(--border-radius-md, 8px); padding: 10px 14px; margin-bottom: 1.5rem; }
  .no-alerts p { font-size: 13px; color: var(--color-text-success); }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.75rem; }
  .stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md, 8px); padding: 1rem; text-align: center; }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
  .stat-number { font-size: 28px; font-weight: 500; margin: 0; }
  .stat-number.danger { color: var(--color-text-danger); }
  .stat-number.warning { color: var(--color-text-warning); }

  .section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 10px; }

  .themes { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
  .theme-card { background: var(--color-background-primary); border-radius: var(--border-radius-lg, 12px); border: 0.5px solid var(--color-border-tertiary); padding: 1rem 1.25rem; }
  .theme-card.urgent { border-color: var(--color-border-danger); }
  .theme-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .theme-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--border-radius-md, 8px); white-space: nowrap; flex-shrink: 0; }
  .badge.pr { background: var(--color-background-danger); color: var(--color-text-danger); }
  .badge.pc { background: var(--color-background-warning); color: var(--color-text-warning); }
  .theme-summary { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 8px; line-height: 1.4; }
  .theme-meta { font-size: 11px; color: var(--color-text-tertiary); }

  .empty-themes { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 13px; background: var(--color-background-primary); border-radius: var(--border-radius-lg, 12px); border: 0.5px solid var(--color-border-tertiary); }
</style>
</head>
<body>
<div style="padding: 0 0.25rem;">

  <div class="header">
    <div>
      <p class="project-label" id="projectLabel"></p>
      <p class="project-title">Alertas del proyecto</p>
    </div>
    <span class="updated-at" id="updatedAt"></span>
  </div>

  <div id="alertsSection"></div>

  <div class="stats">
    <div class="stat-card">
      <p class="stat-label">Pendiente respuesta</p>
      <p class="stat-number danger" id="cnt-pr">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Pendiente cliente</p>
      <p class="stat-number warning" id="cnt-pc">0</p>
    </div>
  </div>

  <p class="section-label" id="themesLabel"></p>
  <div class="themes" id="themesGrid"></div>

</div>

<script>
const MORSE_DATA = /* MORSE_DATA_START */{"project_name":"","folder":"","updated_at":"","alerts":[],"pendiente_respuesta":0,"pendiente_cliente":0,"themes":[]}/* MORSE_DATA_END */;

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

(function init() {
  const d = MORSE_DATA;

  document.getElementById('projectLabel').textContent = d.project_name || d.folder || '—';
  document.getElementById('updatedAt').textContent = d.updated_at ? 'Datos: ' + d.updated_at : '';
  document.getElementById('cnt-pr').textContent = d.pendiente_respuesta || 0;
  document.getElementById('cnt-pc').textContent = d.pendiente_cliente || 0;

  const alertsEl = document.getElementById('alertsSection');
  if (d.alerts && d.alerts.length > 0) {
    alertsEl.innerHTML = '<div class="alerts">' +
      d.alerts.map(a => `
        <div class="alert ${esc(a.type)}">
          <span class="alert-label">${esc(a.label)}</span>
          <span class="alert-text">${esc(a.text)}</span>
        </div>`).join('') +
      '</div>';
  } else {
    alertsEl.innerHTML = '<div class="no-alerts"><p>Sin alertas activas — todo dentro de plazo.</p></div>';
  }

  const themes = d.themes || [];
  const label = document.getElementById('themesLabel');
  const grid = document.getElementById('themesGrid');

  if (themes.length === 0) {
    label.style.display = 'none';
    grid.innerHTML = '<div class="empty-themes">Sin hilos pendientes.</div>';
    return;
  }

  label.textContent = 'Hilos pendientes · ' + themes.length;
  grid.innerHTML = themes.map(t => {
    const isUrgent = t.urgent;
    const isPR = t.status === 'Pendiente respuesta';
    return `
      <div class="theme-card${isUrgent ? ' urgent' : ''}">
        <div class="theme-header">
          <span class="theme-name">${esc(t.name)}</span>
          <span class="badge ${isPR ? 'pr' : 'pc'}">${isPR ? 'Pend. respuesta' : 'Pend. cliente'}</span>
        </div>
        <p class="theme-summary">${esc(t.summary)}</p>
        <p class="theme-meta">${esc(t.count)} comunicación${t.count !== 1 ? 'es' : ''} · último: ${esc(t.last_actor)} · ${esc(t.last_date)}</p>
      </div>`;
  }).join('');
})();
</script>
</body>
</html>
